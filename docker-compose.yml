version: '3.8'

services:
  # 1. Nginx (Web Server ด่านหน้า)
  web:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - pea-network

  # 2. PHP-FPM (ตัวประมวลผล Laravel)
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    volumes:
      - ./:/var/www/html
      # เจาะรู Storage เพื่อไม่ให้ไฟล์ที่อัปโหลดหายตอน Restart
      - storage_data:/var/www/html/storage/app/public
    networks:
      - pea-network

  # 3. Redis (Cache & Queue)
  redis:
    image: redis:alpine
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - pea-network

  # 4. Queue Worker (รอรันงานเบื้องหลัง เช่น โหลด PDF)
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    command: php artisan queue:work redis --sleep=3 --tries=3
    depends_on:
      - redis
      - app
    volumes:
      - ./:/var/www/html
    networks:
      - pea-network

  # 5. Cron Job (ปลุกระบบมาลบถังขยะ หรือคำนวณ Status อัตโนมัติ)
  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    command: sh -c "while true; do php artisan schedule:run --verbose --no-interaction & sleep 60; done"
    depends_on:
      - app
    volumes:
      - ./:/var/www/html
    networks:
      - pea-network

networks:
  pea-network:
    driver: bridge

volumes:
  storage_data: # เก็บไฟล์แนบรูปและเอกสาร
  redis_data:   # เก็บข้อมูล Cache
